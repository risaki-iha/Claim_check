name: クレーム検知くん

on:
  schedule:
    # JST 10:07 / 12:07 / 14:07 / 16:07 / 18:07 / 20:07 月〜金 → UTC 1:07/3:07/5:07/7:07/9:07/11:07
    # 毎時0分はGitHub Actionsが混むため7分にずらして遅延回避
    - cron: "7 1,3,5,7,9,11 * * 1-5"
  workflow_dispatch:
    inputs:
      custom_after:
        description: "検索開始（JST、例: 2026-05-08 17:35）。空なら通常ロジック"
        required: false
        default: ""
      custom_before:
        description: "検索終了（JST、例: 2026-05-08 19:40）。空なら通常ロジック"
        required: false
        default: ""

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claim-detection
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run detection
        env:
          CLAUDE_REFRESH_TOKEN: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          GOOGLE_SHEETS_KEY: ${{ secrets.GOOGLE_SHEETS_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          CUSTOM_AFTER: ${{ github.event.inputs.custom_after }}
          CUSTOM_BEFORE: ${{ github.event.inputs.custom_before }}
        run: python scripts/run_claim_detection.py
